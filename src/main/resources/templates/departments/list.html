<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Departments')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0 fw-bold">Departments</h4>
            <small class="text-muted">Manage company departments</small>
        </div>
        <a th:href="@{/departments/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i> Add Department
        </a>
    </div>

    <!-- Flash Messages -->
    <div th:replace="~{fragments/layout :: flash}"></div>

    <!-- Departments Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Department Name</th>
                        <th>Description</th>
                        <th>Employees</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="dept, i : ${departments}">
                        <td class="text-muted small" th:text="${i.count}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="rounded-circle bg-primary bg-opacity-10 d-flex align-items-center justify-content-center"
                                    style="width:48px; height:48px; flex-shrink:0;">
                                    <i class="bi bi-building text-primary small"></i>
                                </div>
                                <span class="fw-semibold" th:text="${dept.name}"></span>
                            </div>
                        </td>
                        <td class="text-muted"
                            th:text="${dept.description != null ? dept.description : '—'}"></td>
                        <td>
                                <span class="badge bg-light text-dark border px-2 py-1"
                                      th:text="${dept.employees != null ? #lists.size(dept.employees) : 0} + ' employees'">
                                </span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/departments/edit/{id}(id=${dept.id})}"
                               class="btn btn-sm btn-outline-secondary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button type="button" class="btn btn-sm btn-outline-danger"
                                    data-bs-toggle="modal"
                                    data-bs-target="#deleteModal"
                                    th:data-id="${dept.id}"
                                    th:data-name="${dept.name}"
                                    onclick="setDeleteTarget(this)">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                    <!-- Empty state -->
                    <tr th:if="${#lists.isEmpty(departments)}">
                        <td colspan="5" class="text-center text-muted py-5">
                            <i class="bi bi-building-x fs-2 d-block mb-2"></i>
                            No departments yet. <a th:href="@{/departments/new}">Add one!</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div><!-- end main-content -->

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-semibold">Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete the <strong id="deptName"></strong> department?
                    This will not delete its employees.</p>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <a id="deleteConfirmBtn" href="#" class="btn btn-danger">
                    <i class="bi bi-trash me-1"></i> Delete
                </a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    function setDeleteTarget(btn) {
        document.getElementById('deptName').textContent = btn.dataset.name;
        document.getElementById('deleteConfirmBtn').href = '/departments/delete/' + btn.dataset.id;
    }
</script>
</body>
</html>
