<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Department Form')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0 fw-bold"
                th:text="${department.id != null} ? 'Edit Department' : 'Add New Department'">
                Department Form
            </h4>
            <small class="text-muted"
                   th:text="${department.id != null} ? 'Update department details' : 'Create a new department'">
            </small>
        </div>
        <a th:href="@{/departments}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Back
        </a>
    </div>

    <!-- Form Card -->
    <div class="card border-0 shadow-sm" style="max-width: 600px;">
        <div class="card-body p-4">
            <form th:action="@{/departments/save}" th:object="${department}" method="post">

                <!-- Hidden ID for edit -->
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Department Name <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control"
                           th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                           placeholder="e.g. Engineering"/>
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea class="form-control" rows="3"
                              th:field="*{description}"
                              placeholder="Brief description of this department..."></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${department.id != null} ? 'Update Department' : 'Save Department'">Save</span>
                    </button>
                    <a th:href="@{/departments}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</div><!-- end main-content -->

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
