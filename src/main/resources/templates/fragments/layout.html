<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

    <!-- Head Fragment -->
    <head th:fragment="head(title)">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title th:text="${title} + ' | EMS'">Employee Management</title>

        <!--Bootstrap CSS-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <!--Bootstrap iconns-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

        <style>
            body { background-color: #f8f9fa; }

            .sidebar {
                min-height: 100vh; /* stretch full screen no matter how tall*/
                background: #212529;
                width: 200px;
                position: fixed;
                top: 0; left: 0; /* make sidebar at top left corner*/
                z-index: 100; /* stay on top of other content*/
                padding-top: 1rem;
            }
            .sidebar .brand {
                color: #fff;
                font-size: 1.2rem;
                font-weight: 700;
                padding: 1rem 1.5rem 1.5rem;
                border-bottom: 1px solid #444;
                display: block;
            }
            .sidebar .nav-link {
                color: #adb5bd;
                padding: .65rem 1.5rem;
                font-size: .95rem;
                border-radius: 0;
                transition: background .2s, color .2s;
            }
            .sidebar .nav-link:hover,
            .sidebar .nav-link.active {
                background: #0d6efd;
                color: #fff;
            }
            .sidebar .nav-link i { margin-right: .5rem; }

            .main-content {
                margin-left: 200px;
                padding: 2rem;
            }

            .stat-card {
                border: none;
                border-radius: 12px;
                box-shadow: 0 2px 8px rgba(0,0,0,.08);
            }
            .table th { font-size: .85rem; text-transform: uppercase; letter-spacing: .05em; }
            .badge-active   { background-color: #d1e7dd; color: #0f5132; }
            .badge-inactive { background-color: #f8d7da; color: #842029; }
        </style>

    </head>

    <body>

        <!-- ===== NAVBAR / SIDEBAR FRAGMENT ===== -->
        <nav th:fragment="sidebar" class="sidebar d-flex flex-column">
            <a class="brand" th:href="@{/}">
                <i class="bi bi-people-fill text-primary"></i> EMS
            </a>
            <ul class="nav flex-column mt-2">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"
                       th:classappend="${activePage == 'dashboard'} ? 'active'">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/employees}"
                       th:classappend="${activePage == 'employees'} ? 'active'">
                        <i class="bi bi-person-lines-fill"></i> Employees
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/departments}"
                       th:classappend="${activePage == 'departments'} ? 'active'">
                        <i class="bi bi-building"></i> Departments
                    </a>
                </li>
            </ul>
            <div class="mt-auto p-3" style="border-top:1px solid #444;">
                <small class="text-secondary">v1.0.0</small>
            </div>
        </nav>

        <!-- ===== FLASH MESSAGE FRAGMENT ===== -->
        <div th:fragment="flash">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>

        <!--scripts-->
        <div th:fragment = "scripts">
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        </div>
    </body>
</html>
