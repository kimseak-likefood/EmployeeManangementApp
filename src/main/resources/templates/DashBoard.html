<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0 fw-bold">Dashboard</h4>
            <small class="text-muted">Welcome back! Here's what's happening.</small>
        </div>
    </div>

    <!-- Flash Messages -->
    <div th:replace="~{fragments/layout :: flash}"></div>

    <!-- Stat Cards -->
    <div class="row g-4 mb-4">

        <div class="col-md-4">
            <div class="card stat-card p-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-success bg-opacity-10 d-flex align-items-center justify-content-center"
                         style="width:48px; height:48px; flex-shrink:0;">
                        <i class="bi bi-people-fill fs-5 text-primary"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Total Employees</div>
                        <div class="fs-3 fw-bold" th:text="${totalEmployees}">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card stat-card p-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-primary bg-opacity-10
                d-flex align-items-center justify-content-center"
                         style="width:48px; height:48px; flex-shrink:0;">
                        <i class="bi bi-building fs-5 text-success"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Total Departments</div>
                        <div class="fs-3 fw-bold" th:text="${totalDepartments}">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card stat-card p-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-warning bg-opacity-10
                d-flex align-items-center justify-content-center"
                         style="width:48px; height:48px; flex-shrink:0;">
                        <i class="bi bi-person-check-fill fs-5 text-warning"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Active Employees</div>
                        <div class="fs-3 fw-bold" th:text="${activeEmployees}">0</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Recent Employees Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h6 class="mb-0 fw-semibold">Recent Employees</h6>
            <a th:href="@{/employees}" class="btn btn-sm btn-outline-primary">View All</a>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Job Title</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="emp, i : ${recentEmployees}">
                        <td th:text="${i.count}"></td>
                        <td>
                            <a th:href="@{/employees/{id}(id=${emp.id})}"
                               th:text="${emp.firstName + ' ' + emp.lastName}"
                               class="text-decoration-none fw-semibold"></a>
                        </td>
                        <td th:text="${emp.email}"></td>
                        <td th:text="${emp.department != null ? emp.department.name : '—'}"></td>
                        <td th:text="${emp.jobTitle}"></td>
                        <td>
                                <span th:if="${emp.status == 'Active'}"
                                      class="badge badge-active px-2 py-1 rounded-pill">Active</span>
                            <span th:if="${emp.status != 'Active'}"
                                  class="badge badge-inactive px-2 py-1 rounded-pill">Inactive</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentEmployees)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                            No employees yet. <a th:href="@{/employees/new}">Add one!</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div><!-- end main-content -->

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
