<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Employee Detail')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

  <!-- Page Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-0 fw-bold">Employee Profile</h4>
      <small class="text-muted">Full details for this employee</small>
    </div>
    <div class="d-flex gap-2">
      <a th:href="@{/employees}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
      </a>
      <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-primary">
        <i class="bi bi-pencil me-1"></i> Edit
      </a>
    </div>
  </div>

  <div class="row g-4">

    <!-- Profile Card -->
    <div class="col-md-4">
      <div class="card border-0 shadow-sm text-center p-4">
        <!-- Avatar circle with initials -->
        <div class="mx-auto mb-3 rounded-circle bg-primary d-flex align-items-center
                            justify-content-center text-white fw-bold fs-3"
             style="width:80px;height:80px;"
             th:text="${#strings.substring(employee.firstName,0,1) + #strings.substring(employee.lastName,0,1)}">
        </div>
        <h5 class="fw-bold mb-0"
            th:text="${employee.firstName + ' ' + employee.lastName}"></h5>
        <p class="text-muted small mb-2" th:text="${employee.jobTitle != null ? employee.jobTitle : 'No title'}"></p>

        <span th:if="${employee.status == 'Active'}"
              class="badge badge-active rounded-pill px-3 py-1 mb-3">Active</span>
        <span th:if="${employee.status != 'Active'}"
              class="badge badge-inactive rounded-pill px-3 py-1 mb-3">Inactive</span>

        <hr/>
        <div class="text-start small">
          <div class="mb-2">
            <i class="bi bi-envelope text-muted me-2"></i>
            <span th:text="${employee.email}"></span>
          </div>
          <div class="mb-2">
            <i class="bi bi-telephone text-muted me-2"></i>
            <span th:text="${employee.phone != null ? employee.phone : '—'}"></span>
          </div>
          <div>
            <i class="bi bi-building text-muted me-2"></i>
            <span th:text="${employee.department != null ? employee.department.name : '—'}"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Details Card -->
    <div class="col-md-8">
      <div class="card border-0 shadow-sm p-4">
        <h6 class="fw-semibold mb-3 pb-2 border-bottom">Employment Details</h6>
        <div class="row g-3">

          <div class="col-sm-6">
            <div class="text-muted small">First Name</div>
            <div class="fw-semibold" th:text="${employee.firstName}"></div>
          </div>

          <div class="col-sm-6">
            <div class="text-muted small">Last Name</div>
            <div class="fw-semibold" th:text="${employee.lastName}"></div>
          </div>

          <div class="col-sm-6">
            <div class="text-muted small">Email</div>
            <div class="fw-semibold" th:text="${employee.email}"></div>
          </div>

          <div class="col-sm-6">
            <div class="text-muted small">Phone</div>
            <div class="fw-semibold" th:text="${employee.phone != null ? employee.phone : '—'}"></div>
          </div>

          <div class="col-sm-6">
            <div class="text-muted small">Job Title</div>
            <div class="fw-semibold" th:text="${employee.jobTitle != null ? employee.jobTitle : '—'}"></div>
          </div>

          <div class="col-sm-6">
            <div class="text-muted small">Department</div>
            <div class="fw-semibold"
                 th:text="${employee.department != null ? employee.department.name : '—'}"></div>
          </div>

          <div class="col-sm-6">
            <div class="text-muted small">Hire Date</div>
            <div class="fw-semibold"
                 th:text="${employee.hireDate != null ? #temporals.format(employee.hireDate, 'MMM dd, yyyy') : '—'}"></div>
          </div>

          <div class="col-sm-6">
            <div class="text-muted small">Salary</div>
            <div class="fw-semibold"
                 th:text="${employee.salary != null ? '$' + #numbers.formatDecimal(employee.salary, 1, 'COMMA', 2, 'POINT') : '—'}"></div>
          </div>

          <div class="col-sm-6">
            <div class="text-muted small">Employee ID</div>
            <div class="fw-semibold text-muted" th:text="'#' + ${employee.id}"></div>
          </div>

          <div class="col-sm-6">
            <div class="text-muted small">Status</div>
            <span th:if="${employee.status == 'Active'}"
                  class="badge badge-active rounded-pill px-2">Active</span>
            <span th:if="${employee.status != 'Active'}"
                  class="badge badge-inactive rounded-pill px-2">Inactive</span>
          </div>

        </div>
      </div>
    </div>

  </div>

</div><!-- end main-content -->

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
