<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Employee Form')}"></head>

<body>

  <div th:replace="~{fragments/layout :: sidebar}"></div>

  <div class="main-content">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="mb-0 fw-bold"
            th:text="${employee.id != null} ? 'Edit Employee' : 'Add New Employee'">
          Employee Form
        </h4>
        <small class="text-muted"
               th:text="${employee.id != null} ? 'Update employee details' : 'Fill in the details below'">
        </small>
      </div>
      <a th:href="@{/employees}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
      </a>
    </div>

    <!-- Form Card -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form th:action="@{/employees/save}" th:object="${employee}" method="post">

          <!-- Hidden ID for edit -->
          <input type="hidden" th:field="*{id}"/>

          <div class="row g-3">

            <!-- First Name -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control"
                     th:field="*{firstName}"
                     th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                     placeholder="e.g. John"/>
              <div class="invalid-feedback" th:errors="*{firstName}"></div>
            </div>

            <!-- Last Name -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control"
                     th:field="*{lastName}"
                     th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                     placeholder="e.g. Doe"/>
              <div class="invalid-feedback" th:errors="*{lastName}"></div>
            </div>

            <!-- Email -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
              <input type="email" class="form-control"
                     th:field="*{email}"
                     th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                     placeholder="e.g. john@company.com"/>
              <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>

            <!-- Phone -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Phone</label>
              <input type="text" class="form-control"
                     th:field="*{phone}"
                     placeholder="e.g. +1 555 000 0000"/>
            </div>

            <!-- Job Title -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Job Title</label>
              <input type="text" class="form-control"
                     th:field="*{jobTitle}"
                     placeholder="e.g. Software Engineer"/>
            </div>

            <!-- Department -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Department</label>
              <select class="form-select" th:field="*{department}">
                <option value="">-- Select Department --</option>
                <option th:each="dept : ${departments}"
                        th:value="${dept.id}"
                        th:text="${dept.name}"
                        th:selected="${employee.department != null
                           and employee.department.id == dept.id}">
                </option>
              </select>
            </div>

            <!-- Hire Date -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Hire Date</label>
              <input type="date" class="form-control"
                     th:field="*{hireDate}"
                     th:classappend="${#fields.hasErrors('hireDate')} ? 'is-invalid'"
                     min="2026-01-01"
                     max="2026-12-31"
              />
              <div class="invalid-feedback" th:errors="*{hireDate}">
                Hire date must be within 2026
              </div>

            </div>

            <!-- Salary -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Salary ($)</label>
              <input type="number" class="form-control"
                     th:field="*{salary}"
                     placeholder="e.g. 500"
                     step="10" min="100" max="10000"/>
            </div>

            <!-- Status -->
            <div class="col-md-12">
              <label class="form-label fw-semibold">Status</label>
              <div class="d-flex gap-4 mt-1">
                <div class="form-check">
                  <input class="form-check-input" type="radio"
                         th:field="*{status}" value="Active" id="statusActive"/>
                  <label class="form-check-label" for="statusActive">
                    <span class="badge badge-active px-2">Active</span>
                  </label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio"
                         th:field="*{status}" value="Inactive" id="statusInactive"/>
                  <label class="form-check-label" for="statusInactive">
                    <span class="badge badge-inactive px-2">Inactive</span>
                  </label>
                </div>
              </div>
            </div>

          </div><!-- end row -->

          <hr class="my-4"/>

          <!-- Buttons -->
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-save me-1"></i>
              <span th:text="${employee.id != null} ? 'Update Employee' : 'Save Employee'">Save</span>
            </button>
            <a th:href="@{/employees}" class="btn btn-outline-secondary px-4">Cancel</a>
          </div>

        </form>
      </div>
    </div>

  </div><!-- end main-content -->

  <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
