<!DOCTYPE html>
  <html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/layout :: head('Employees')}"></head>

  <body>
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <div class="main-content"></div>

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="mb-0 fw-bold">Employees</h4>
        <small class="text-muted">Manage all employees</small>
      </div>
      <a th:href="@{/employees/new}" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i> Add Employee
      </a>
    </div>

    <!-- Flash Messages -->
    <div th:replace="~{fragments/layout :: flash}"></div>

    <!-- Search Bar -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body py-2">
        <form th:action="@{/employees}" method="get" class="d-flex gap-2">
          <input type="text" name="keyword" class="form-control"
                 placeholder="Search by first name..."
                 th:value="${keyword}"/>
          <button type="submit" class="btn btn-outline-primary px-4">
            <i class="bi bi-search"></i>
          </button>
          <a th:href="@{/employees}" class="btn btn-outline-secondary px-3"
             th:if="${keyword != null and !#strings.isEmpty(keyword)}">
            <i class="bi bi-x-lg"></i>
          </a>
        </form>
      </div>
    </div>

    <!-- Employee Table -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Department</th>
              <th>Job Title</th>
              <th>Status</th>
              <th class="text-center">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="emp, i : ${employees}">
              <td class="text-muted small" th:text="${i.count}"></td>
              <td>
                <a th:href="@{/employees/{id}(id=${emp.id})}"
                   class="text-decoration-none fw-semibold text-dark"
                   th:text="${emp.firstName + ' ' + emp.lastName}"></a>
              </td>
              <td th:text="${emp.email}"></td>
              <td th:text="${emp.phone != null ? emp.phone : '—'}"></td>
              <td th:text="${emp.department != null ? emp.department.name : '—'}"></td>
              <td th:text="${emp.jobTitle != null ? emp.jobTitle : '—'}"></td>
              <td>
                                <span th:if="${emp.status == 'Active'}"
                                      class="badge badge-active rounded-pill px-2">Active</span>
                <span th:if="${emp.status != 'Active'}"
                      class="badge badge-inactive rounded-pill px-2">Inactive</span>
              </td>
              <td class="text-center">
                <a th:href="@{/employees/edit/{id}(id=${emp.id})}"
                   class="btn btn-sm btn-outline-secondary me-1">
                  <i class="bi bi-pencil"></i>
                </a>
                <!-- Delete Button triggers modal -->
                <button type="button" class="btn btn-sm btn-outline-danger"
                        data-bs-toggle="modal"
                        data-bs-target="#deleteModal"
                        th:data-id="${emp.id}"
                        th:data-name="${emp.firstName + ' ' + emp.lastName}"
                        onclick="setDeleteTarget(this)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
            <!-- Empty state -->
            <tr th:if="${#lists.isEmpty(employees)}">
              <td colspan="8" class="text-center text-muted py-5">
                <i class="bi bi-person-x fs-2 d-block mb-2"></i>
                <span th:if="${keyword != null}">No employees found for "<strong th:text="${keyword}"></strong>"</span>
                <span th:if="${keyword == null}">No employees yet. <a th:href="@{/employees/new}">Add one!</a></span>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    </div><!-- end main-content -->

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-semibold">Confirm Delete</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p>Are you sure you want to delete <strong id="empName"></strong>?
              This action cannot be undone.</p>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <a id="deleteConfirmBtn" href="#" class="btn btn-danger">
              <i class="bi bi-trash me-1"></i> Delete
            </a>
          </div>
        </div>
      </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>

    <script>
    function setDeleteTarget(btn) {
    document.getElementById('empName').textContent = btn.dataset.name;
    document.getElementById('deleteConfirmBtn').href = '/employees/delete/' + btn.dataset.id;
    }
    </script>

  </body>
</html>
